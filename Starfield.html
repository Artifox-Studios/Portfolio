<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifox Studios - Portfolio</title>
  </head>
  <body>
    <canvas id="starfield"></canvas>
    <style>
      body {
          margin: 0;
          overflow-x: hidden;
          background: black;
          color: white;
          font-family: Arial, sans-serif;
      }
  
      #starfield {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          z-index: -1;
      }
  
      main {
          position: relative;
          z-index: 10;
      }
    </style>
  
    <main>
      <h1>Artifox Studios</h1>
      <p>Bienvenido a mi portafolio.</p>
      <img src="artifox.jpg" alt="Artifox Studio" style="max-width:100%; height:auto;">
    </main>
  
    <script src="assets/js/starfield.js"></script>
  </body>
</html>
