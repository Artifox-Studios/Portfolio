<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Fondo de estrellas</title>

    < style>
      body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
        color: white;
      }

      #starfield {
        position: fixed;
        inset: 0;
        z-index: -1;
      }

      main {
        position: relative;
        padding: 2rem;
        z-index: 10;
      }
    </style>
  </head>
  <body>

    <canvas id="starfield"></canvas>

    <main>
      <h1>Mi Portafolio</h1>
      <p>Este es un fondo de estrellas en 3D con parallax.</p>
    </main>

    <script src="assets/js/starfield.js"></script>
  </body>
</html>
